# Config for COCO Segmentation, M2F (Mask2Former) decoder training
# Based on config-coco-linear-training.yaml with the following key changes:
# - decoder_head.type: m2f (Mask2Former decoder with DINOv3_Adapter)
# - decoder_head.backbone_out_layers: FOUR_EVEN_INTERVALS (multi-scale features)
# - bs: 2 (reduced due to higher VRAM usage from M2F + Adapter)
# - optimizer.lr: 1e-4 (lower LR for the larger decoder)
# - scheduler.total_iter: 20000

bs: 2  # Reduced from 4 due to higher VRAM usage (M2F + DINOv3_Adapter)
n_gpus: 1
metric_to_save: 'mIoU'
model_dtype: FLOAT32
scheduler:
  total_iter: 20000
  type: 'WarmupOneCycleLR'
  constructor_kwargs:
    warmup_iters: 1000
    warmup_ratio: 1e-6
    final_div_factor: .inf
    pct_start: 0
    anneal_strategy: 'cos'
    use_beta1: False
    update_momentum: False
optimizer:
  lr: 1e-4
  beta1: 0.9
  beta2: 0.999
  weight_decay: 1e-2
  gradient_clip: 35.0
datasets:
  root: ""  # Path to bepli_v2 directory (containing train/, val/ with _annotations.coco.json and images/)
  train: "COCOSegmentation:split=TRAIN"
  val: "COCOSegmentation:split=VAL"
train:
  diceloss_weight: 0.5
  celoss_weight: 1.0
  class_weight: [0.1, 0.6047, 1.2736, 0.3393, 0.6696, 0.5980, 0.2457, 2.9051, 0.1825, 0.6214, 4.1945, 0.3648]
decoder_head:
  type: "m2f"  # Mask2Former decoder with DINOv3_Adapter
  backbone_out_layers: FOUR_EVEN_INTERVALS  # Extract 4 intermediate layers for multi-scale features
  use_cls_token: False
  use_batchnorm: True
  use_backbone_norm: True
  num_classes: 12  # bepli_v2: 11 debris classes + background
  hidden_dim: 256  # M2F hidden dimension (reduced from default 2048 for smaller dataset)
  dropout: 0.1
transforms:
  train:
    img_size: 512
    random_img_size_ratio_range: [0.5, 2.0]
    crop_size: [512, 512]
    flip_prob: 0.5
  eval:
    img_size: 512
eval:
  compute_metric_per_image: False
  reduce_zero_label: False  # COCO includes background as class 0
  mode: "slide"
  crop_size: 512
  stride: 341
  eval_interval: 2000
  use_tta: False
