# Config for COCO Segmentation, linear training

bs: 4  # Batch size per GPU (reduced from 8 for COCO's larger images)
n_gpus: 8
metric_to_save: 'mIoU'
model_dtype: FLOAT32
scheduler:
  total_iter: 40000
  type: 'WarmupOneCycleLR'
  constructor_kwargs:
    warmup_iters: 1500
    warmup_ratio: 1e-6
    final_div_factor: .inf
    pct_start: 0
    anneal_strategy: 'cos'
    use_beta1: False
    update_momentum: False
optimizer:
  lr : 1e-3
  beta1: 0.9
  beta2: 0.999
  weight_decay: 1e-3
  gradient_clip: 'inf'
datasets:
  root: ""  # Path to the COCO dataset (containing train2017/, val2017/, annotations/)
  train: "COCOSegmentation:split=TRAIN"
  val: "COCOSegmentation:split=VAL"
train:
  diceloss_weight: 0.0
  celoss_weight: 1.0
decoder_head:
  type: "linear"  # Linear probing with frozen backbone
  backbone_out_layers: LAST  # Use only last layer for lightweight decoder
  use_cls_token: False
  use_batchnorm: True
  use_backbone_norm: True
  num_classes: 81  # COCO: 80 object classes + background
transforms:
  train:
    img_size: 512
    random_img_size_ratio_range: [0.5, 2.0]
    crop_size: [512, 512]
    flip_prob: 0.5
  eval:
    img_size: 512
eval:
  compute_metric_per_image: False
  reduce_zero_label: False  # COCO includes background as class 0
  mode: "slide"
  crop_size: 512
  stride: 341
  eval_interval: 5000
  use_tta: False
