# Config for COCO Segmentation, linear training v2
# - CrossEntropy + Dice loss (0.5 + 0.5)
# - Class weights (inverse frequency from bepli_v2 train set)

bs: 4
n_gpus: 8
metric_to_save: 'mIoU'
model_dtype: FLOAT32
scheduler:
  total_iter: 40000
  type: 'WarmupOneCycleLR'
  constructor_kwargs:
    warmup_iters: 1500
    warmup_ratio: 1e-6
    final_div_factor: .inf
    pct_start: 0
    anneal_strategy: 'cos'
    use_beta1: False
    update_momentum: False
optimizer:
  lr: 1e-3
  beta1: 0.9
  beta2: 0.999
  weight_decay: 1e-3
  gradient_clip: 'inf'
datasets:
  root: ""
  train: "COCOSegmentation:split=TRAIN"
  val: "COCOSegmentation:split=VAL"
train:
  diceloss_weight: 0.5
  celoss_weight: 0.5
  # Inverse-frequency class weights (normalized, mean=1) from bepli_v2 train set
  # background is strongly downweighted (0.0008) to counter 98.2% dominance
  class_weight: [0.0008, 0.6047, 1.2736, 0.3393, 0.6696, 0.5980, 0.2457, 2.9051, 0.1825, 0.6214, 4.1945, 0.3648]
decoder_head:
  type: "linear"
  backbone_out_layers: LAST
  use_cls_token: False
  use_batchnorm: True
  use_backbone_norm: True
  num_classes: 12
transforms:
  train:
    img_size: 512
    random_img_size_ratio_range: [0.5, 2.0]
    crop_size: [512, 512]
    flip_prob: 0.5
  eval:
    img_size: 512
eval:
  compute_metric_per_image: False
  reduce_zero_label: False
  mode: "slide"
  crop_size: 512
  stride: 341
  eval_interval: 5000
  use_tta: False
